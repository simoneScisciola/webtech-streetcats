<section
  class="w-100 h-100 d-flex flex-column align-items-center justify-content-center text-center bg-dark p-4"
  aria-label="Welcome to Webtech's StreetCats"
>

  <!-- Logo -->
  <img
    src="/assets/webtech-streetcats.svg"
    alt="Streetcats Logo"
    class="hero__logo mb-4 animate__animated animate__fadeInDown"
    width="90"
    height="90"
  >

  <!-- App name -->
  <h1 class="hero__title fw-bold text-white my-3 animate__animated animate__fadeInUp">
    Webtech's <em class="hero__title-accent fst-italic text-primary">StreetCats</em>
  </h1>

  <!-- Tagline -->
  <p class="hero__tagline fw-light text-uppercase my-3 mb-5 animate__animated animate__fadeInUp">
    A community-powered map of stray cats.
  </p>

  <!-- CTA group -->
  <div
    class="hero__actions d-flex flex-wrap gap-3 justify-content-center animate__animated animate__fadeInUp"
  >
    <!-- Primary CTA -->
    <a routerLink="/sightings-map" class="btn btn-primary btn-lg">
      <fa-icon [icon]="icons.map" class="me-2">
      </fa-icon>Explore the Map
    </a>

    <!-- Secondary CTA -->
    <a routerLink="/sign-up" class="btn btn-outline-light btn-lg">
      <fa-icon [icon]="icons.join" class="me-2">
      </fa-icon>Join the Community
    </a>
  </div>

</section>
