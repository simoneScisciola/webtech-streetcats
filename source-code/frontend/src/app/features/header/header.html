<header class="bg-dark text-white">
  <div class="container-fluid py-3 px-4" style="font-size: 1.15rem;">
    <div class="row align-items-center gy-3">

      <!-- Logo -->
      <div class="col-12 col-md d-flex justify-content-center justify-content-md-start">
        <a title="Webtech's StreetCats" 
          class="d-flex align-items-center gap-3 text-white text-decoration-none"
          routerLink="/home">
          <img
            src="assets/webtech-streetcats.svg"
            alt="Webtech's StreetCats"
            height="44"
          />
        </a>
      </div>

      <!-- Navbar ng-bootstrap -->
      <div class="col-12 col-md-auto d-flex justify-content-center">
        <app-navbar></app-navbar>
      </div>

      <!-- Auth area -->
      <div class="col-12 col-md d-flex justify-content-center justify-content-md-end">
        @if(authService.isAuthenticated()) {
          <app-profile-dropdown />
        } @else {
          <app-auth-area />
        }
      </div>

    </div>
  </div>
</header>
